<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>การเปลี่ยนพรรค กทม. 65 → 69</title>
<style>
@font-face { font-family:'SaoChingcha'; src:url('SaoChingcha-Bold.otf') format('opentype'); font-weight:700; }
@font-face { font-family:'SaoChingcha'; src:url('SaoChingcha-Regular.otf') format('opentype'); font-weight:400; }
@font-face { font-family:'SaoChingcha'; src:url('SaoChingcha-Light.otf') format('opentype'); font-weight:300; }
@font-face { font-family:'BKKDraft5'; src:url('BKKDraft5-Regular.otf') format('opentype'); }

:root,[data-theme="dark"]{
  --bg:#0e0e0e;--fg:#ffffff;--sub:#666;--note:#7a7a7a;--note-b:#cfcfcf;--sec-border:#161616;
  --tt-bg:rgba(15,15,15,.97);--tt-border:rgba(255,255,255,.1);
  --panel-bg:rgba(14,14,14,.98);--panel-border:rgba(255,255,255,.12);--panel-hr:rgba(255,255,255,.08);
  --kind:#777;--arr:#555;--meta:#777;
  --card-border:rgba(255,255,255,.07);--card-bg:rgba(255,255,255,.015);
  --person:#ddd;--dvotes:#888;--dist:#888;--dyr:#666;--legend:#666;
  --btn-bg:rgba(255,255,255,.06);--btn-fg:#aaa;--btn-bg-h:rgba(255,255,255,.14);--btn-fg-h:#fff;
  --scrim:rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg:#f6f6f8;--fg:#16161c;--sub:#9a9aa2;--note:#5a5a63;--note-b:#1c1c22;--sec-border:#e5e5ea;
  --tt-bg:rgba(255,255,255,.98);--tt-border:rgba(0,0,0,.12);
  --panel-bg:rgba(250,250,252,.98);--panel-border:rgba(0,0,0,.12);--panel-hr:rgba(0,0,0,.08);
  --kind:#8a8a92;--arr:#aaa;--meta:#888;
  --card-border:rgba(0,0,0,.09);--card-bg:rgba(0,0,0,.02);
  --person:#33333a;--dvotes:#777;--dist:#888;--dyr:#999;--legend:#8a8a92;
  --btn-bg:rgba(0,0,0,.06);--btn-fg:#555;--btn-bg-h:rgba(0,0,0,.12);--btn-fg-h:#000;
  --scrim:rgba(0,0,0,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'SaoChingcha','Sarabun',sans-serif;min-height:100vh;transition:background .25s,color .25s}

.theme-toggle{position:fixed;top:16px;left:18px;z-index:400;width:38px;height:38px;border:1px solid var(--panel-border);
  background:var(--btn-bg);color:var(--btn-fg);border-radius:10px;font-size:17px;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
.theme-toggle:hover{background:var(--btn-bg-h);color:var(--btn-fg-h)}

.page-head{text-align:center;padding:34px 40px 6px}
.page-head h1{font-family:'BKKDraft5','SaoChingcha',sans-serif;font-size:25px;letter-spacing:.04em;margin-bottom:6px}
.page-head .sub{font-size:12.5px;color:var(--sub);font-weight:300}

.section{padding:26px 0 14px;border-top:1px solid var(--sec-border);margin-top:14px}
.count-pill{display:inline-block;margin-top:8px;font-size:11.5px;color:var(--note);border:1px solid var(--sec-border);border-radius:30px;padding:4px 13px;font-weight:300}
.page-foot{text-align:center;padding:26px 40px 44px;margin-top:18px;border-top:1px solid var(--sec-border);font-size:12px;color:var(--sub);line-height:1.7}
.page-foot a{color:var(--note-b);text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:1px}
.page-foot a:hover{opacity:.75}
.sec-head{text-align:center;padding:0 40px 4px;max-width:860px;margin:0 auto}
.sec-head h2{font-family:'BKKDraft5','SaoChingcha',sans-serif;font-size:19px;letter-spacing:.02em;margin-bottom:7px}
.sec-head .note{font-size:12.5px;color:var(--note);font-weight:300;line-height:1.65}
.sec-head .note b{color:var(--note-b);font-weight:700}
svg{display:block;margin:0 auto;max-width:100%}

.tt{position:fixed;background:var(--tt-bg);border:1px solid var(--tt-border);border-radius:9px;padding:11px 15px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:200;max-width:280px;font-size:12.5px;line-height:1.75;backdrop-filter:blur(10px)}

.panel{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:92vw;background:var(--panel-bg);border-left:1px solid var(--panel-border);
  transform:translateX(105%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:300;display:flex;flex-direction:column;backdrop-filter:blur(14px)}
.panel.open{transform:translateX(0)}
.panel-head{padding:20px 22px 14px;border-bottom:1px solid var(--panel-hr);flex:0 0 auto;position:relative}
.panel-kind{font-size:10.5px;letter-spacing:.08em;color:var(--kind);text-transform:uppercase;margin-bottom:6px}
.panel-flow{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;flex-wrap:wrap}
.panel-flow .arr{color:var(--arr);font-weight:400}
.panel-meta{margin-top:7px;font-size:12px;color:var(--meta);display:flex;gap:14px;flex-wrap:wrap}
.panel-close{position:absolute;top:16px;right:18px;width:28px;height:28px;border:none;background:var(--btn-bg);color:var(--btn-fg);border-radius:7px;font-size:17px;cursor:pointer;line-height:1}
.panel-close:hover{background:var(--btn-bg-h);color:var(--btn-fg-h)}
.panel-body{overflow-y:auto;padding:8px 14px 30px;flex:1 1 auto}

.dcard{border:1px solid var(--card-border);border-radius:11px;padding:13px 15px;margin:10px 0;background:var(--card-bg)}
.dname{font-size:14.5px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dname .dist{color:var(--dist);font-size:11.5px;font-weight:400}
.drow{display:flex;align-items:baseline;gap:8px;font-size:12.5px;line-height:1.7;padding:1px 0}
.dyr{color:var(--dyr);font-size:10.5px;width:26px;flex:0 0 auto;font-weight:700}
.dparty{font-weight:700}
.dperson{color:var(--person)}
.dvotes{color:var(--dvotes);margin-left:auto;font-variant-numeric:tabular-nums;font-size:11.5px}
.tags{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
.tag{font-size:10.5px;padding:2px 9px;border-radius:20px;font-weight:700}
.tag.same{background:rgba(34,197,94,.13);color:#2e9e5b;border:1px solid rgba(34,197,94,.3)}
.tag.diff{background:rgba(255,103,0,.13);color:#d4660a;border:1px solid rgba(255,103,0,.3)}
.tag.up{background:rgba(34,197,94,.12);color:#2e9e5b}
.tag.down{background:rgba(229,57,53,.12);color:#d23b37}
[data-theme="dark"] .tag.same,[data-theme="dark"] .tag.up{color:#46d27e}
[data-theme="dark"] .tag.diff{color:#ff8a3d}
[data-theme="dark"] .tag.down{color:#ff6b67}
.legend-note{font-size:11px;color:var(--legend);padding:4px 4px 12px;line-height:1.6}
.scrim{position:fixed;inset:0;background:var(--scrim);opacity:0;pointer-events:none;transition:opacity .26s;z-index:250}
.scrim.open{opacity:1;pointer-events:auto}
</style>
</head>
<body>
<button id="themeToggle" class="theme-toggle" aria-label="สลับโหมดสว่าง/มืด" title="สลับโหมดสว่าง/มืด">☀</button>
<div class="page-head">
  <h1 id="pageTitle"></h1>
  <p class="sub" id="pageSub"></p>
  <div class="count-pill" id="countPill"></div>
</div>

<div class="section">
  <div class="sec-head">
    <h2>① ที่นั่งเปลี่ยนมือ — มองที่ “เขต”</h2>
    <p class="note" id="noteSeat"></p>
  </div>
  <svg id="chartSeat" width="980" height="680"></svg>
</div>

<div class="section">
  <div class="sec-head">
    <h2>② คนเดิม — มองที่ “คน”</h2>
    <p class="note" id="notePerson"></p>
  </div>
  <svg id="chartPerson" width="980" height="540"></svg>
</div>

<footer class="page-foot">
  ข้อมูลจาก <a id="srcLink" target="_blank" rel="noopener"></a><br>
  <span id="footCounted"></span> · เปรียบเทียบเฉพาะผู้สมัครอันดับ 1 ของแต่ละเขต<br>
  <span id="footUpdated" style="opacity:.8"></span>
</footer>

<div class="tt" id="tt"></div>
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel">
  <div class="panel-head">
    <button class="panel-close" id="panelClose">×</button>
    <div class="panel-kind" id="panelKind"></div>
    <div class="panel-flow" id="panelFlow"></div>
    <div class="panel-meta" id="panelMeta"></div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<!-- ====== ข้อมูล (แก้ที่ไฟล์นี้ไฟล์เดียว) ====== -->
<script src="data.js"></script>

<!-- ====== logic + render (คำนวณกราฟจากข้อมูลข้างบนทั้งหมด) ====== -->
<script>
(function(){
const NS='http://www.w3.org/2000/svg';
const E=window.ELECTION;
const META=E.meta, PARTIES=E.parties;
const y65=E.year65, y69=E.year69;

/* ---------- derive everything from raw data ---------- */
function pinfo(name){ return PARTIES[name] || {label:name,color:'#888',canon:name}; }
function canon(name){ return pinfo(name).canon || name; }
function partyEq(a,b){ return canon(a)===canon(b); }

const SEP='\u0001';
const by65={},by69={};
y65.forEach(r=>by65[r.district]=r);
y69.forEach(r=>by69[r.district]=r);

// per-district detail
const DIST={};
y65.forEach(r=>{const b=by69[r.district]||{};DIST[r.district]={c65:r.candidate,p65:r.party,v65:r.votes,c69:b.candidate,p69:b.party,v69:b.votes};});
const dget=n=>DIST[n]||null;

// nodes from a set of winners (sorted by count desc)
function nodesOf(counts){
  return Object.keys(counts)
    .sort((a,b)=> counts[b]-counts[a] || a.localeCompare(b,'th'))
    .map(name=>({id:name, ...pinfo(name), count:counts[name]}));
}
function countBy(rows,key){const c={};rows.forEach(r=>{const k=key(r);c[k]=(c[k]||0)+1;});return c;}

// SEAT graph (unit = districts)
const S_P65=nodesOf(countBy(y65,r=>r.party));
const S_P69=nodesOf(countBy(y69,r=>r.party));
function orderIndex(nodes){const o={};nodes.forEach((n,i)=>o[n.id]=i);return o;}
function buildSeatFlows(){
  const m={};
  y65.forEach(r=>{
    const b=by69[r.district]; if(!b)return;
    const k=r.party+''+b.party;
    (m[k]||(m[k]={from:r.party,to:b.party,v:0,d:[]}));
    m[k].v++; m[k].d.push(r.district);
  });
  const fo=orderIndex(S_P65), to=orderIndex(S_P69);
  return Object.values(m).sort((x,y)=>(fo[x.from]-fo[y.from])||(to[x.to]-to[y.to]));
}
const S_FLOWS=buildSeatFlows();

// PERSON graph (unit = incumbents who won both years), minus hidden flows
const HIDE=new Set((E.hidePersonFlows||[]).map(p=>p[0]+''+p[1]));
const incumbents=y65.filter(r=>{const b=by69[r.district];return b && b.candidate===r.candidate;});
function buildPersonFlows(){
  const m={};
  incumbents.forEach(r=>{
    const b=by69[r.district]; const k=r.party+''+b.party;
    if(HIDE.has(k))return;
    (m[k]||(m[k]={from:r.party,to:b.party,v:0,people:[]}));
    m[k].v++; m[k].people.push({district:r.district,name:r.candidate,v65:r.votes,v69:b.votes});
  });
  return Object.values(m);
}
const PERSON_FLOWS=buildPersonFlows();
const PR_P65=nodesOf((()=>{const c={};PERSON_FLOWS.forEach(f=>c[f.from]=(c[f.from]||0)+f.v);return c;})());
const PR_P69=nodesOf((()=>{const c={};PERSON_FLOWS.forEach(f=>c[f.to]=(c[f.to]||0)+f.v);return c;})());
(function(){const fo=orderIndex(PR_P65),to=orderIndex(PR_P69);
  PERSON_FLOWS.sort((x,y)=>(fo[x.from]-fo[y.from])||(to[x.to]-to[y.to]));})();

const personTotal=PERSON_FLOWS.reduce((s,f)=>s+f.v,0);

/* ---------- helpers ---------- */
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmt(n){return n==null?'–':Number(n).toLocaleString('en-US');}
function voteTag(v65,v69){
  if(v65==null||v69==null)return '';
  const diff=v69-v65, pct=v65?Math.round(diff/v65*100):0, cls=diff>=0?'up':'down', s=diff>=0?'+':'';
  return `<span class="tag ${cls}">${diff>=0?'▲':'▼'} ${s}${fmt(diff)} (${s}${pct}%)</span>`;
}

/* ---------- theme chrome ---------- */
const CHROME={
  dark:{bg:'#0e0e0e',axis:'#999',axisLine:'#444',nodeText:'#fff',foot:'#555'},
  light:{bg:'#f6f6f8',axis:'#555',axisLine:'#bbb',nodeText:'#16161c',foot:'#aaa'}
};
let curTheme='dark', CH=CHROME.dark;

/* ---------- render ---------- */
function render(cfg){
  const svg=document.getElementById(cfg.svgId);
  const W=+svg.getAttribute('width'), H=+svg.getAttribute('height');
  const NW=24,UNIT=10,GAP=15,LX=215,RX=740,TOP=58;
  const mk=(tag,a,par)=>{const e=document.createElementNS(NS,tag);Object.entries(a||{}).forEach(([k,v])=>e.setAttribute(k,v));(par||svg).appendChild(e);return e;};
  const txt=(x,y,s,a,par)=>{const t=mk('text',{x,y,...a},par);t.textContent=s;return t;};
  const layout=(ps,x)=>{const m={};let y=TOP;ps.forEach(p=>{const h=p.count*UNIT;m[p.id]={...p,x,y,h};y+=h+GAP;});return m;};
  const L=layout(cfg.P65,LX), R=layout(cfg.P69,RX);

  mk('rect',{width:W,height:H,fill:CH.bg});
  txt(LX+NW/2,TOP-22,'ปี '+META.yearLeft,{'text-anchor':'middle',fill:CH.axis,'font-size':'18','font-family':'BKKDraft5, SaoChingcha, sans-serif','font-weight':'700'});
  txt(RX+NW/2,TOP-22,'ปี '+META.yearRight,{'text-anchor':'middle',fill:CH.axis,'font-size':'18','font-family':'BKKDraft5, SaoChingcha, sans-serif','font-weight':'700'});
  mk('line',{x1:LX-2,y1:TOP-15,x2:LX+NW+2,y2:TOP-15,stroke:CH.axisLine,'stroke-width':'1'});
  mk('line',{x1:RX-2,y1:TOP-15,x2:RX+NW+2,y2:TOP-15,stroke:CH.axisLine,'stroke-width':'1'});

  const LU={},RU={};cfg.P65.forEach(p=>LU[p.id]=0);cfg.P69.forEach(p=>RU[p.id]=0);
  const fg=mk('g',{}), flows=[];
  cfg.FLOWS.forEach(f=>{
    const fn=L[f.from],tn=R[f.to];if(!fn||!tn)return;
    const fh=f.v*UNIT;
    const y1a=fn.y+LU[f.from], y1b=y1a+fh, y2a=tn.y+RU[f.to], y2b=y2a+fh;
    LU[f.from]+=fh;RU[f.to]+=fh;
    const x1=LX+NW,x2=RX,cp1=x1+(x2-x1)*0.45,cp2=x1+(x2-x1)*0.55;
    const d=`M${x1},${y1a}C${cp1},${y1a} ${cp2},${y2a} ${x2},${y2a}L${x2},${y2b}C${cp2},${y2b} ${cp1},${y1b} ${x1},${y1b}Z`;
    const path=mk('path',{d,fill:fn.color,opacity:'0.48',cursor:'pointer'},fg);
    flows.push({path,f,fn,tn});
  });

  const tt=document.getElementById('tt');
  flows.forEach(({path,f,fn,tn})=>{
    const fromL=cfg.P65.find(p=>p.id===f.from).label, toL=cfg.P69.find(p=>p.id===f.to).label;
    const unit=cfg.mode==='seat'?'เขต':'คน';
    const names=cfg.mode==='seat'?f.d:f.people.map(p=>p.name);
    path.addEventListener('mouseenter',function(){
      flows.forEach(o=>o.path.setAttribute('opacity','0.08'));
      this.setAttribute('opacity','0.8');
      tt.innerHTML=`<b style="color:${fn.color}">${esc(fromL)}</b><span style="color:#888"> → </span><b style="color:${tn.color}">${esc(toL)}</b><br><span style="color:#888;font-size:11px">${f.v} ${unit} · คลิกเพื่อดูรายละเอียด</span><br><span style="color:#888;font-size:11.5px;line-height:1.6">${esc(names.join(' · '))}</span>`;
      tt.style.opacity='1';
    });
    path.addEventListener('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-12)+'px';});
    path.addEventListener('mouseleave',function(){flows.forEach(o=>o.path.setAttribute('opacity','0.48'));tt.style.opacity='0';});
    path.addEventListener('click',e=>{e.stopPropagation();tt.style.opacity='0';openPanel(cfg.mode,f,fn,tn,fromL,toL);});
  });

  function drawNode(n,isLeft){
    mk('rect',{x:n.x,y:n.y,width:NW,height:Math.max(n.h,4),fill:n.color,rx:4});
    const my=n.y+n.h/2, hasSub=!!n.sub, mainY=hasSub?my-9:my;
    const tx=isLeft?n.x-11:n.x+NW+11, anc=isLeft?'end':'start';
    txt(tx,mainY,n.label,{'text-anchor':anc,'dominant-baseline':'middle','font-size':'13.5',fill:CH.nodeText,'font-family':'SaoChingcha, sans-serif','font-weight':'700'});
    if(hasSub)txt(tx,my+10,n.sub,{'text-anchor':anc,'dominant-baseline':'middle','font-size':'11',fill:n.color,'font-family':'SaoChingcha, sans-serif'});
    const cx=isLeft?n.x+NW+7:n.x-7, canc=isLeft?'start':'end';
    txt(cx,my,`${n.count}`,{'text-anchor':canc,'dominant-baseline':'middle','font-size':'11',fill:n.color,'font-family':'SaoChingcha, sans-serif','font-weight':'700'});
  }
  cfg.P65.forEach(p=>drawNode(L[p.id],true));
  cfg.P69.forEach(p=>drawNode(R[p.id],false));
  txt(W/2,H-12,'hover ดูรายชื่อ · คลิกที่เส้นเพื่อดูรายละเอียด',{'text-anchor':'middle',fill:CH.foot,'font-size':'11','font-family':'SaoChingcha, sans-serif'});
}

/* ---------- click panel ---------- */
const panel=document.getElementById('panel'),scrim=document.getElementById('scrim');
const pKind=document.getElementById('panelKind'),pFlow=document.getElementById('panelFlow'),pMeta=document.getElementById('panelMeta'),pBody=document.getElementById('panelBody');

function openPanel(mode,f,fn,tn,fromL,toL){
  pFlow.innerHTML=`<span style="color:${fn.color}">${esc(fromL)}</span><span class="arr">→</span><span style="color:${tn.color}">${esc(toL)}</span>`;
  let cards='';
  if(mode==='seat'){
    pKind.textContent='เขตเปลี่ยนมือ · เทียบรายเขต';
    let same=0,nw=0;
    cards=f.d.map(name=>{
      const r=dget(name);
      if(!r)return `<div class="dcard"><div class="dname">${esc(name)}</div><div class="legend-note">ไม่พบข้อมูล</div></div>`;
      const ps=r.c65&&r.c69&&r.c65===r.c69; ps?same++:nw++;
      const pty=partyEq(r.p65,r.p69);
      return `<div class="dcard"><div class="dname">${esc(name)}</div>
        <div class="drow"><span class="dyr">${esc(META.yearLeft)}</span><span class="dparty" style="color:${fn.color}">${esc(r.p65)}</span><span class="dperson">${esc(r.c65)}</span><span class="dvotes">${fmt(r.v65)}</span></div>
        <div class="drow"><span class="dyr">${esc(META.yearRight)}</span><span class="dparty" style="color:${tn.color}">${esc(r.p69)}</span><span class="dperson">${esc(r.c69)}</span><span class="dvotes">${fmt(r.v69)}</span></div>
        <div class="tags"><span class="tag ${ps?'same':'diff'}">${ps?'คนเดิม':'คนใหม่'}</span><span class="tag ${pty?'same':'diff'}">${pty?'พรรค/กลุ่มเดิม':'เปลี่ยนพรรค/กลุ่ม'}</span>${voteTag(r.v65,r.v69)}</div></div>`;
    }).join('');
    pMeta.innerHTML=`<span>${f.v} เขต</span><span style="color:#46d27e">คนเดิม ${same}</span><span style="color:#ff8a3d">คนใหม่ ${nw}</span>`;
    pBody.innerHTML=`<div class="legend-note">แต่ละเขต: พรรค/กลุ่ม · ชื่อผู้ชนะ · คะแนน — ป้ายบอกว่าเป็นคนเดิมหรือคนใหม่</div>`+cards;
  } else {
    pKind.textContent='คนเดิม · รายคน';
    const samePty=partyEq(f.from,f.to);
    cards=f.people.map(p=>`<div class="dcard"><div class="dname">${esc(p.name)} <span class="dist">เขต${esc(p.district)}</span></div>
        <div class="drow"><span class="dyr">${esc(META.yearLeft)}</span><span class="dparty" style="color:${fn.color}">${esc(fromL)}</span><span class="dvotes">${fmt(p.v65)}</span></div>
        <div class="drow"><span class="dyr">${esc(META.yearRight)}</span><span class="dparty" style="color:${tn.color}">${esc(toL)}</span><span class="dvotes">${fmt(p.v69)}</span></div>
        <div class="tags"><span class="tag ${samePty?'same':'diff'}">${samePty?'พรรค/กลุ่มเดิม':'เปลี่ยนพรรค/กลุ่ม'}</span>${voteTag(p.v65,p.v69)}</div></div>`).join('');
    pMeta.innerHTML=`<span>${f.v} คน</span><span style="color:${samePty?'#46d27e':'#ff8a3d'}">${samePty?'อยู่ที่เดิม':'ย้ายพรรค/กลุ่ม'}</span>`;
    pBody.innerHTML=`<div class="legend-note">คนเดียวกันที่ชนะทั้งสองปี — เทียบคะแนน ปี ${esc(META.yearLeft)} → ปี ${esc(META.yearRight)}</div>`+cards;
  }
  panel.classList.add('open');scrim.classList.add('open');
}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('open');}
document.getElementById('panelClose').addEventListener('click',closePanel);
scrim.addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

/* ---------- fill text from META ---------- */
const L=META.yearLeft, R=META.yearRight, N=y65.length;
document.getElementById('pageTitle').textContent='การเปลี่ยนพรรค/กลุ่ม ผู้นำเขต กทม. · ปี '+L+' → ปี '+R;
document.getElementById('pageSub').textContent='ผู้สมัครอันดับ 1 แต่ละเขต · '+N+' เขต · แยกเป็น 2 มุมมอง';
document.getElementById('countPill').textContent='นับคะแนนแล้ว (อย่างไม่เป็นทางการ '+META.countedPct+'%)';
document.getElementById('noteSeat').innerHTML='หน่วย = <b>เขต</b> ('+N+' ที่นั่ง) · เส้นบอกว่า เขตที่พรรคทางซ้ายเคยชนะปี '+L+' ปี '+R+' ตกเป็นของพรรคทางขวา<br>เส้นนี้ <b>ไม่ได้</b>แปลว่าเป็นคนเดิมย้ายพรรค — อาจเป็นคนใหม่จากอีกพรรคมาชนะก็ได้ (คลิกที่เส้นเพื่อดูรายเขต)';
document.getElementById('notePerson').innerHTML='หน่วย = <b>คน</b> · เฉพาะ “คนเดิม” (ผู้ชนะคนเดียวกันทั้งสองปี) '+personTotal+' คน<br>เส้นแสดงว่าแต่ละคนไปสังกัดพรรค/กลุ่มใดในปี '+R+' — เส้นที่ข้ามพรรคคือ<b>ย้ายจริง</b> · เขตที่ได้คนใหม่ไม่อยู่ในกราฟนี้ · คลิกดูรายชื่อ';
const sl=document.getElementById('srcLink'); sl.textContent=META.source.name; sl.href=META.source.url;
document.getElementById('footCounted').textContent='นับคะแนนแล้ว (อย่างไม่เป็นทางการ '+META.countedPct+'%)';
document.getElementById('footUpdated').textContent='แก้ไขข้อมูลล่าสุด: '+META.updatedAt;

/* ---------- theme ---------- */
function renderAll(){
  ['chartSeat','chartPerson'].forEach(id=>{document.getElementById(id).innerHTML='';});
  render({svgId:'chartSeat',  P65:S_P65, P69:S_P69, FLOWS:S_FLOWS,      mode:'seat'});
  render({svgId:'chartPerson',P65:PR_P65,P69:PR_P69,FLOWS:PERSON_FLOWS, mode:'person'});
}
const tBtn=document.getElementById('themeToggle');
function applyTheme(t){
  curTheme=t; CH=CHROME[t];
  document.documentElement.setAttribute('data-theme',t);
  tBtn.textContent = t==='dark' ? '☀' : '☾';
  try{localStorage.setItem('bkk-theme',t);}catch(e){}
  renderAll();
}
let initT='dark';
try{ const s=localStorage.getItem('bkk-theme');
  initT = s || (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches ? 'light':'dark');
}catch(e){}
applyTheme(initT);
tBtn.addEventListener('click',()=>applyTheme(curTheme==='dark'?'light':'dark'));

})();
</script>
